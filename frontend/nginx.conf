# nginx do dashboard (doc 13): serve o build do React em / e faz proxy de /api
# para o FastAPI. Config HTTP (dev / atras de um TLS terminador). Para TLS direto
# no nginx (Let's Encrypt), veja nginx.prod.conf.
server {
  listen 80;
  server_name _;

  server_tokens off;
  client_max_body_size 5m;   # payload de update (backup.py) via /api

  # cabecalhos de seguranca
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;

  # /api/... -> FastAPI (o trailing slash no proxy_pass remove o prefixo /api)
  location /api/ {
    proxy_pass http://api:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA: qualquer rota cai no index.html (client-side)
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
